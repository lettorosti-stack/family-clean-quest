<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Clean Quest Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #dbeafe 0%, #f8fafc 45%, #dcfce7 100%);
      font-family: Arial, sans-serif;
      color: #0f172a;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    button { font: inherit; border: 0; cursor: pointer; }
    .phone {
      width: 410px;
      max-width: 100%;
      min-height: 820px;
      background: #f8fafc;
      border: 8px solid #111827;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(15, 23, 42, .28);
    }
    .screen { padding: 18px; max-height: 820px; overflow-y: auto; }
    .top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
    .kicker { font-size: 11px; color: #64748b; font-weight: 800; text-transform: uppercase; letter-spacing: .4px; }
    h1 { font-size: 18px; line-height: 1.15; margin: 4px 0 0; max-width: 260px; }
    .sync { background: #ecfeff; color: #155e75; border-radius: 999px; padding: 8px 10px; font-size: 12px; font-weight: 800; white-space: nowrap; }
    .members { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .member { text-align: left; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; min-height: 66px; cursor: default; }
    .member.active { background: #f8fafc; box-shadow: inset 0 0 0 2px var(--member-color); }
    .name { font-size: 14px; font-weight: 900; color: var(--member-color); }
    .points { margin-top: 5px; font-size: 13px; color: #475569; font-weight: 800; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--member-color); background: color-mix(in srgb, var(--member-color) 14%, white); display: grid; place-items: center; color: var(--member-color); font-weight: 900; overflow: hidden; margin-bottom: 6px; position: relative; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; background: #fff; }
    .avatar.has-image { cursor: zoom-in; }
    .score { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; margin-bottom: 10px; box-shadow: 0 8px 22px rgba(15, 23, 42, .05); }
    .score-label { color: #64748b; font-size: 12px; font-weight: 800; }
    .score-value { font-size: 18px; font-weight: 900; margin-top: 4px; }
    .score-value.with-icon { display: flex; align-items: center; gap: 8px; }
    .score-value.with-icon img { width: 34px; height: 34px; object-fit: contain; flex: 0 0 auto; }
    .tabs { background: #e2e8f0; border-radius: 8px; padding: 4px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin: 10px 0 18px; position: sticky; top: 0; z-index: 2; }
    .tab { min-height: 46px; border-radius: 6px; color: #475569; font-size: 12px; font-weight: 900; background: transparent; }
    .tab.active { background: #fff; color: #0f172a; }
    .section { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .section-icon { font-size: 20px; }
    h2 { font-size: 18px; margin: 0; }
    .sub { margin-top: 2px; color: #64748b; font-size: 13px; line-height: 1.35; }
    .floor-title { font-size: 15px; font-weight: 900; margin: 14px 0 8px; }
    .zone-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .zone { min-height: 132px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; text-align: left; display: flex; flex-direction: column; justify-content: space-between; gap: 6px; box-shadow: 0 8px 18px rgba(15, 23, 42, .04); }
    .zone.wide { grid-column: 1 / -1; }
    .zone.selected { outline: 2px solid #0f766e; }
    .zone-top { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; min-width: 0; }
    .zone-title { font-size: 13px; line-height: 1.12; font-weight: 900; overflow-wrap: anywhere; }
    .zone-icon-wrap { position: relative; align-self: center; display: grid; place-items: center; width: 126px; height: 102px; }
    .zone-icon { width: 120px; height: 98px; object-fit: contain; margin: 0; pointer-events: none; }
    .zone-zoom { position: absolute; right: 0; top: 0; width: 30px; height: 30px; border-radius: 15px; background: rgba(15, 23, 42, .74); color: #fff; display: grid; place-items: center; font-size: 14px; font-weight: 900; box-shadow: 0 6px 14px rgba(15, 23, 42, .22); cursor: zoom-in; }
    .zone-zoom:focus-visible { outline: 2px solid #0f766e; outline-offset: 2px; }
    .status { width: max-content; min-height: 28px; border-radius: 14px; padding: 4px 9px; font-size: 10px; line-height: 1.05; font-weight: 900; white-space: nowrap; text-align: center; display: inline-flex; align-items: center; justify-content: center; align-self: center; }
    .status.red { background: #ffe4e6; color: #be123c; }
    .status.yellow { background: #fef3c7; color: #b45309; }
    .status.green { background: #dcfce7; color: #047857; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; min-height: 74px; padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; width: 100%; text-align: left; box-shadow: 0 8px 18px rgba(15, 23, 42, .04); }
    .card.done { background: #f0fdf4; border-color: #bbf7d0; }
    .task-card-icon { width: 48px; height: 48px; object-fit: contain; flex: 0 0 auto; }
    .reward-card-icon { width: 58px; height: 58px; object-fit: contain; flex: 0 0 auto; }
    .card-main { flex: 1; }
    .task-title { font-size: 15px; font-weight: 900; }
    .meta { color: #64748b; font-size: 12px; margin-top: 5px; line-height: 1.35; }
    .pill { min-width: 44px; height: 36px; border-radius: 18px; background: #dcfce7; color: #15803d; display: grid; place-items: center; font-size: 15px; font-weight: 900; }
    .pill.done { background: #15803d; color: #fff; }
    .danger { color: #be123c; font-size: 12px; font-weight: 900; }
    .lock { color: #64748b; font-size: 18px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 10px; }
    .small-btn { height: 32px; padding: 0 12px; border-radius: 16px; background: #e2e8f0; color: #334155; font-size: 12px; font-weight: 900; }
    .toast { min-height: 38px; margin: 0 0 12px; padding: 10px 12px; border-radius: 8px; background: #ecfeff; color: #155e75; font-size: 13px; font-weight: 800; display: none; }
    .toast.show { display: block; }
    .empty { text-align: center; color: #64748b; font-weight: 800; padding: 24px 0; }
    .reward-title { margin-top: 16px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 10px 0 14px; }
    .day { aspect-ratio: 1; border-radius: 8px; background: #fff; border: 1px solid #e2e8f0; color: #0f172a; font-size: 12px; font-weight: 900; display: grid; place-items: center; position: relative; }
    .day.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    .day.today { box-shadow: inset 0 0 0 2px #f59e0b; }
    .day .count { position: absolute; right: 4px; bottom: 2px; font-size: 10px; color: #7c3aed; }
    .day.active .count { color: #fff; }
    .date-title { font-size: 15px; font-weight: 900; margin: 0 0 8px; }
    .date-input { width: 100%; height: 42px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0 12px; font: inherit; font-weight: 800; color: #0f172a; background: #fff; margin-bottom: 12px; }
    .form-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin: 10px 0 12px; box-shadow: 0 8px 18px rgba(15, 23, 42, .04); }
    .form-grid { display: grid; grid-template-columns: 1fr 86px; gap: 8px; margin-top: 8px; }
    .form-grid.wide { grid-template-columns: 1fr; }
    .text-input, .select-input { width: 100%; height: 38px; border: 1px solid #cbd5e1; border-radius: 8px; padding: 0 10px; font: inherit; font-size: 13px; font-weight: 800; background: #fff; color: #0f172a; }
    .approval { display: flex; gap: 6px; }
    .approve, .reject { min-width: 42px; height: 34px; border-radius: 17px; font-size: 12px; font-weight: 900; }
    .approve { background: #dcfce7; color: #047857; }
    .reject { background: #ffe4e6; color: #be123c; }
    .top-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .logout, .sync-btn { height: 34px; border-radius: 17px; background: #f1f5f9; color: #334155; font-size: 12px; font-weight: 900; padding: 0 12px; }
    .sync-btn { background: #ecfeff; color: #155e75; }
    .login-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 14px; box-shadow: 0 8px 22px rgba(15, 23, 42, .06); }
    .login-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 12px 0; }
    .login-person { min-height: 58px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; text-align: left; padding: 10px 12px; font-weight: 900; color: var(--member-color); }
    .login-person.active { outline: 2px solid var(--member-color); background: #f8fafc; }
    .pin-input { width: 100%; height: 46px; border-radius: 8px; border: 1px solid #cbd5e1; padding: 0 12px; font: inherit; font-weight: 900; letter-spacing: 4px; margin-bottom: 10px; }
    .primary-action { width: 100%; min-height: 46px; border-radius: 8px; background: #0f766e; color: #fff; font-weight: 900; }
    .hint { font-size: 12px; color: #64748b; line-height: 1.4; margin-top: 10px; }
    .avatar-panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 14px; display: grid; grid-template-columns: 58px 1fr; gap: 10px; align-items: center; box-shadow: 0 8px 18px rgba(15, 23, 42, .04); }
    .avatar.big { width: 58px; height: 58px; margin: 0; }
    .file-label { display: inline-grid; place-items: center; min-height: 34px; border-radius: 17px; background: #e2e8f0; color: #334155; font-size: 12px; font-weight: 900; padding: 0 12px; margin-top: 8px; cursor: pointer; }
    .file-label input { display: none; }
    .avatar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .avatar-picker { margin-top: 10px; grid-column: 1 / -1; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; display: none; }
    .avatar-picker.show { display: block; }
    .avatar-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 8px; }
    .avatar-choice { min-height: 150px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; display: grid; place-items: center; font-size: 28px; padding: 8px; position: relative; }
    .avatar-choice img { width: 100%; height: 132px; object-fit: contain; display: block; }
    .avatar-choice.selected { outline: 2px solid #0f766e; background: #ecfdf5; }
    .avatar-view { position: absolute; right: 6px; top: 6px; min-width: 28px; height: 28px; border-radius: 14px; background: rgba(15, 23, 42, .72); color: #fff; font-size: 13px; font-weight: 900; }
    .avatar-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, .55); display: none; place-items: center; padding: 24px; z-index: 20; }
    .avatar-modal.show { display: grid; }
    .avatar-modal-card { width: min(360px, 92vw); max-height: 88vh; background: #fff; border-radius: 8px; padding: 14px; box-shadow: 0 24px 60px rgba(15, 23, 42, .35); }
    .avatar-modal-card img { width: 100%; max-height: 68vh; object-fit: contain; display: block; }
    .modal-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
    .modal-title { font-size: 15px; font-weight: 900; }
    .avatar-editor-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, .45); display: none; place-items: center; padding: 18px; z-index: 18; }
    .avatar-editor-modal.show { display: grid; }
    .avatar-editor-card { width: min(390px, 94vw); max-height: 88vh; overflow: auto; background: #fff; border-radius: 8px; padding: 14px; box-shadow: 0 24px 60px rgba(15, 23, 42, .35); }
    .reward-icon { width: 22px; height: 22px; object-fit: contain; display: block; }
    .reward-icon.big { width: 30px; height: 30px; }
    .task-icon { width: 22px; height: 22px; object-fit: contain; display: block; }
    .task-icon.big { width: 30px; height: 30px; }
    .nav-icon { width: 22px; height: 22px; object-fit: contain; display: block; }
    .nav-icon.big { width: 30px; height: 30px; }
    .zoomable-icon { cursor: zoom-in; }
    @media (max-width: 430px) {
      body { padding: 0; background: #f8fafc; }
      .phone { width: 100%; min-height: 100vh; border: 0; border-radius: 0; box-shadow: none; }
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="screen">
      <div class="top">
        <div>
          <div class="kicker">Family Clean Quest</div>
          <h1>Семейные дела</h1>
        </div>
        <div class="top-actions">
          <button class="sync-btn" id="topSync">Синхр.</button>
          <button class="logout" id="topLogout">Выйти</button>
        </div>
      </div>

      <div class="members" id="members"></div>
      <div class="score">
        <div>
          <div class="score-label">Активный пользователь</div>
          <div class="score-value" id="activeName"></div>
        </div>
        <div>
          <div class="score-label">Команда</div>
          <div class="score-value" id="teamScore"></div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="home"><img class="nav-icon" src="assets/icons/home-house-transparent.png" alt=""> Дом</button>
        <button class="tab" data-tab="tasks"><img class="nav-icon" src="assets/icons/tasks-list-transparent.png" alt=""> Дела</button>
        <button class="tab" data-tab="history"><img class="nav-icon" src="assets/icons/calendar-transparent.png" alt=""> Журнал</button>
        <button class="tab" data-tab="rewards"><img class="nav-icon" src="assets/icons/reward-gift-transparent.png" alt=""> Награды</button>
      </div>

      <div class="toast" id="toast"></div>
      <div id="content"></div>
    </div>
  </main>
  <div class="avatar-modal" id="avatarModal">
    <div class="avatar-modal-card">
      <div class="modal-top">
        <div class="modal-title" id="avatarModalTitle">Аватар</div>
        <button class="small-btn" id="closeAvatarModal">Закрыть</button>
      </div>
      <img id="avatarModalImage" alt="Аватар">
    </div>
  </div>
  <div class="avatar-editor-modal" id="avatarEditorModal">
    <div class="avatar-editor-card">
      <div class="modal-top">
        <div class="modal-title" id="avatarEditorTitle">Выбор аватара</div>
        <button class="small-btn" id="closeAvatarEditor">Закрыть</button>
      </div>
      <div id="avatarEditorContent"></div>
    </div>
  </div>

        if (masterDone) return false;

      if (task.intervalDays) {

        const image = new Image();

          const size = 256;
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const context = canvas.getContext('2d');
          const scale = Math.max(size / image.width, size / image.height);
          const width = image.width * scale;
          const height = image.height * scale;
          context.drawImage(image, (size - width) / 2, (size - height) / 2, width, height);

          save();
          showToast('Аватар обновлен и подготовлен для синхронизации.');

    function loginWithPassword() {
      const selected = member(state.loginChoice);
      const passwordInput = document.getElementById('passwordInput');
      const password = passwordInput?.value?.trim() || '';
      if (!selected || !passwordInput) return;
      const savedPassword = state.passwords?.[selected.id];
      if (!savedPassword) {
        const passwordConfirm = document.getElementById('passwordConfirm')?.value?.trim() || '';
        if (password.length < 4) {
          showToast('Пароль должен быть не короче 4 символов.');
          return;
        }
        if (password !== passwordConfirm) {
          showToast('Пароли не совпадают.');
          return;
        }
        if (selected.id === 'mom' && !state.recoveryWord) {
          const recoveryWord = document.getElementById('recoveryWordCreate')?.value?.trim() || '';
          if (!recoveryWord || recoveryWord.length < 3) {
            showToast('Для маминого профиля нужно кодовое слово не короче 3 символов.');
            return;
          }
          state.recoveryWord = recoveryWord;
        }
        state.passwords[selected.id] = password;
      } else if (password !== savedPassword) {
        showToast('Неверный пароль для выбранного профиля.');
        return;
      }
      state.active = selected.id;
      state.tab = 'home';
      save();
      showToast(`Вход выполнен: ${selected.name}.`);
      render();
    }
    function resetPassword(memberId) {
      if (member(state.active)?.role !== 'parent') {
        showToast('Сбросить пароль может только мама.');
        return;
      }
      const target = member(memberId);
      if (!target) return;
      if (target.id === 'mom' && !confirmRecoveryWord()) return;
      state.passwords[target.id] = '';
      state.passwordResetRequests = state.passwordResetRequests.map(item => item.memberId === target.id ? { ...item, status: 'resolved', resolvedAt: new Date().toISOString(), updatedAt: new Date().toISOString() } : item);
      save();
      showToast(`Пароль сброшен: ${target.name}.`);
      render();
    }
    function confirmRecoveryWord() {
      const inlineValue = document.getElementById('recoveryWordReset')?.value?.trim() || document.getElementById('recoveryWordInput')?.value?.trim() || '';
      if (!state.recoveryWord) {
        const nextWord = inlineValue;
        if (!nextWord || nextWord.length < 3) {
          showToast('Кодовое слово должно быть не короче 3 символов.');
          return false;
        }
        state.recoveryWord = nextWord;
        return true;
      }
      const value = inlineValue;
      if (!value) {
        showToast('Введите кодовое слово мамы.');
        return false;
      }
      if (value !== state.recoveryWord) {
        showToast('Кодовое слово не совпадает.');
        return false;
      }
      return true;
    }
    function resetMomByRecoveryWord() {
      if (!confirmRecoveryWord()) return;
      state.passwords.mom = '';
      state.active = null;
      state.loginChoice = 'mom';
      state.tab = 'home';
      save();
      showToast('Пароль мамы сброшен. Теперь задайте новый пароль.');
      render();

    function saveRecoveryWord() {
      const input = document.getElementById('recoveryWordInput');

        return;

    function renderHistory() {

        const day = index + 1;
        const date = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const count = state.completed.filter(x => x.date === date).length;
        return { day, date, count };
      });
      const selectedItems = sortForMember(state.completed.filter(x => x.date === state.selectedDate), state.active);

        showToast('Дети могут отмечать выполненные дела только за сегодняшний день.');
        return;

      const alreadyDone = state.completed.some(x => x.date === doneDate && (x.taskId === task.id || x.title === task.title));
      if (alreadyDone) {
        showToast('Это дело уже отмечено выполненным на выбранную дату.');
        return;

      state.completed.unshift({ id: Date.now(), taskId: task.id, title: task.title, area: task.area, points: task.points, memberId, date: doneDate, updatedAt: new Date().toISOString() });

        if (existing) {

      document.querySelectorAll('[data-vote-team-yes]').forEach(btn => btn.onclick = (event) => { event.stopPropagation(); voteTeamReward(Number(btn.dataset.voteTeamYes), 'yes'); });
      document.querySelectorAll('[data-vote-team-no]').forEach(btn => btn.onclick = (event) => { event.stopPropagation(); voteTeamReward(Number(btn.dataset.voteTeamNo), 'no'); });
      document.querySelectorAll('[data-schedule-team]').forEach(btn => btn.onclick = (event) => { event.stopPropagation(); scheduleTeamReward(Number(btn.dataset.scheduleTeam)); });
    };
    tasks.push(
      { id: 'grocery-shopping', title: 'Общие задачи: Покупка продуктов', area: 'общие задачи', points: 3, cadence: '1 раз в неделю' },
      { id: 'kitchen-cook-breakfast', title: 'Кухня: приготовление еды - завтрак', area: '1 этаж - кухня', points: 2, cadence: 'по необходимости' },
      { id: 'kitchen-cook-lunch', title: 'Кухня: приготовление еды - обед', area: '1 этаж - кухня', points: 3, cadence: 'по необходимости' },
      { id: 'kitchen-cook-dinner', title: 'Кухня: приготовление еды - ужин', area: '1 этаж - кухня', points: 3, cadence: 'по необходимости' },
      { id: 'kitchen-cook-baking', title: 'Кухня: приготовление еды - выпечка', area: '1 этаж - кухня', points: 4, cadence: 'по необходимости' },
      { id: 'car-refuel', title: 'Автомобиль: Заправить машину', area: 'гараж', points: 2, cadence: 'по необходимости' },
      { id: 'car-maintenance', title: 'Автомобиль: Сделать ТО', area: 'гараж', points: 5, cadence: 'по регламенту' },
      { id: 'car-tires', title: 'Автомобиль: Замена шин', area: 'гараж', points: 5, cadence: 'перед зимой и после зимы' },
      { id: 'common-water-flowers', title: 'Общие задачи: полить цветы', area: 'общие задачи', points: 2, cadence: '2 раза в неделю' },
      { id: 'diana-homework-reading', title: 'Диана: сделать уроки / чтение', area: 'личные задачи', points: 2, cadence: 'ежедневно', memberIds: ['diana'] },
      { id: 'diana-sport', title: 'Диана: занятие спортом', area: 'личные задачи', points: 2, cadence: 'регулярно', memberIds: ['diana'] },
      { id: 'veronika-homework-reading', title: 'Вероника: сделать уроки / чтение', area: 'личные задачи', points: 2, cadence: 'ежедневно', memberIds: ['veronika'] },
      { id: 'veronika-synthesizer', title: 'Вероника: игра на синтезаторе', area: 'личные задачи', points: 2, cadence: 'регулярно', memberIds: ['veronika'] },
      { id: 'veronika-guitar', title: 'Вероника: игра на гитаре', area: 'личные задачи', points: 2, cadence: 'регулярно', memberIds: ['veronika'] },
      { id: 'grandparents-feed-animals', title: 'Помощь бабушке и дедушке: покормить животных', area: 'помощь бабушке и дедушке', points: 2, cadence: 'по необходимости' },
      { id: 'grandparents-cleaning', title: 'Помощь бабушке и дедушке: помочь с уборкой', area: 'помощь бабушке и дедушке', points: 2, cadence: 'по необходимости' },
      { id: 'grandparents-greenhouse-water', title: 'Помощь бабушке и дедушке: полить в теплице', area: 'помощь бабушке и дедушке', points: 2, cadence: 'по необходимости' }
    );
    Object.assign(taskIcons, {
      'floor-washer-water': 'mop-robot-water',
      'floor-washer-clean': 'mop-robot-brushes',
      'grocery-shopping': 'grocery-shopping',
      'common-water-flowers': 'common-water-flowers',
      'diana-homework-reading': 'personal-homework-reading',
      'diana-sport': 'personal-sport',
      'veronika-homework-reading': 'personal-homework-reading',
      'veronika-synthesizer': 'personal-synthesizer',
      'veronika-guitar': 'personal-guitar',
      'kitchen-cook-breakfast': 'cook-breakfast',
      'kitchen-cook-lunch': 'cook-lunch',
      'kitchen-cook-dinner': 'cook-dinner',
      'kitchen-cook-baking': 'cook-baking',
      'car-refuel': 'car-refuel',
      'car-maintenance': 'car-maintenance',
      'car-tires': 'car-tires',
      'grandparents-feed-animals': 'grandparents-feed-animals',
      'grandparents-cleaning': 'grandparents-cleaning',
      'grandparents-greenhouse-water': 'grandparents-greenhouse-water'
    });
    const rewardIcons = {
      personal: {
        15: 'sweet-drink',
        35: 'no-chores-evening',
        60: 'movie-cafe',
        90: 'small-shopping',
        150: 'special-day'
      },
      team: {
        200: 'family-dinner',
        320: 'family-evening',
        480: 'family-trip',
        700: 'dream-day'
      }
    };
    function rewardIconSrc(item) {
      const icon = rewardIcons[item.kind || 'personal']?.[item.points] || rewardIcons.team[item.points] || rewardIcons.personal[item.points] || 'team-rewards';
      return `assets/reward-icons/${icon}.png`;
    }
    function rewardCardIcon(item) {
      return `<img class="reward-card-icon" src="${rewardIconSrc(item)}" alt="">`;
    }
    const renderRewardsWithoutIcons = renderRewards;
    renderRewards = function() {
      return renderRewardsWithoutIcons()
        .replaceAll('<button class="card" data-personal=', '<button class="card" data-personal=')
        .replaceAll(/<button class="card" data-personal="(\d+)"><div class="card-main">/g, (match, index) => `<button class="card" data-personal="${index}">${rewardCardIcon({ ...personalRewards[Number(index)], kind: 'personal' })}<div class="card-main">`)
        .replaceAll(/<button class="card" data-team="(\d+)"><div class="card-main">/g, (match, index) => `<button class="card" data-team="${index}">${rewardCardIcon({ ...teamRewards[Number(index)], kind: 'team' })}<div class="card-main">`)
        .replaceAll(/<div class="card">\s*<div class="card-main"><div class="task-title">([^<]+)<\/div><div class="meta">([^<]*)/g, (match, title, meta) => {
          const purchase = state.purchases.find(item => item.title === title);
          return purchase ? `<div class="card">${rewardCardIcon(purchase)}<div class="card-main"><div class="task-title">${title}</div><div class="meta">${meta}` : match;
        });
    };
    function personalRewardOwnerIconSrc(memberId = state.active) {
      return {
        mom: 'assets/reward-icons/personal-mom.png',
        veronika: 'assets/reward-icons/personal-veronika.png',
        diana: 'assets/reward-icons/personal-diana.png'
      }[memberId] || 'assets/icons/reward-gift-transparent.png';
    }
    const renderShellWithTeamIcon = renderShell;
    renderShell = function() {
      renderShellWithTeamIcon();
      const team = document.getElementById('teamScore');
      if (team) {
        team.classList.add('with-icon');
        team.innerHTML = `<img class="zoomable-icon" src="assets/reward-icons/team-rewards.png" alt=""> <span>${teamScore()} б.</span>`;
      }
    };
    const renderRewardsWithOwnerIcons = renderRewards;
    renderRewards = function() {
      return renderRewardsWithOwnerIcons()
        .replace('src="assets/icons/reward-gift-transparent.png" alt=""><div><h2>Личные награды</h2>', `src="${personalRewardOwnerIconSrc()}" alt=""><div><h2>Личные награды</h2>`)
        .replace('Командный баланс тоже уменьшается после подтверждения личной награды.', 'Командный баланс уменьшается только при получении командной награды.');
    };
    const bindContentWithIconZoom = bindContent;
    bindContent = function() {
      bindContentWithIconZoom();
      document.querySelectorAll('[data-zone-zoom]').forEach(btn => {
        btn.onclick = (event) => {
          event.stopPropagation();
          const allZones = zoneGroups.flatMap(group => group.zones);
          const zone = allZones.find(item => item.id === btn.dataset.zoneZoom);
          if (zone && zoneIcons[zone.id]) showAvatarPreview(zoneIcons[zone.id], zone.title);
        };
        btn.onkeydown = (event) => {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          event.preventDefault();
          btn.click();
        };
      });
      document.querySelectorAll('img.task-card-icon, img.reward-card-icon, img.nav-icon, #teamScore img').forEach(img => {
        img.classList.add('zoomable-icon');
        img.onclick = (event) => {
          event.stopPropagation();
          showAvatarPreview(img.getAttribute('src'), img.getAttribute('alt') || 'Иконка');
        };
      });
    };
    render();
  </script>
</body>
