name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate embedded preview HTML
        run: npm run generate:preview

      - name: Check Expo project
        run: npx expo-doctor

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Verify Android app metadata
        shell: bash
        run: |
          echo "Generated Android strings:"
          cat android/app/src/main/res/values/strings.xml
          if grep -R "Hello App Display Name" -n android/app/src/main; then
            echo "Template app name is still present. Expo config was not applied."
            exit 1
          fi

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease
        working-directory: android

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: family-clean-quest-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: family-clean-quest-release-apk
          path: android/app/build/outputs/apk/release/*.apk
