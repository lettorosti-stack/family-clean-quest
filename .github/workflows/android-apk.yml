name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build Android release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Unpack project
        shell: bash
        run: |
          rm -rf app
          mkdir -p app

          python3 - <<'PY'
          import pathlib
          import shutil
          import zipfile

          archive_path = pathlib.Path("family-clean-quest-source.zip")
          target_dir = pathlib.Path("app").resolve()

          if not archive_path.exists():
              raise FileNotFoundError(
                  f"Archive not found: {archive_path}"
              )

          with zipfile.ZipFile(archive_path) as archive:
              for item in archive.infolist():
                  normalized_name = item.filename.replace("\\", "/").lstrip("/")

                  if not normalized_name:
                      continue

                  destination = (target_dir / normalized_name).resolve()

                  try:
                      destination.relative_to(target_dir)
                  except ValueError as error:
                      raise RuntimeError(
                          f"Unsafe archive path: {item.filename}"
                      ) from error

                  if item.is_dir() or normalized_name.endswith("/"):
                      destination.mkdir(parents=True, exist_ok=True)
                      continue

                  destination.parent.mkdir(parents=True, exist_ok=True)

                  with archive.open(item) as source:
                      with destination.open("wb") as output:
                          shutil.copyfileobj(source, output)

          print("Archive unpacked successfully")
          PY

      - name: Find project root
        shell: bash
        run: |
          echo "Files after unpacking:"
          find app -maxdepth 3 -type f | sort | head -200

          PACKAGE_JSON=$(find app -maxdepth 3 -type f -name package.json | head -1)

          if [ -z "$PACKAGE_JSON" ]; then
            echo "ERROR: package.json was not found inside the archive."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PACKAGE_JSON")
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project directory: $PROJECT_DIR"

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm install --no-audit --no-fund

      - name: Check Expo project
        working-directory: ${{ env.PROJECT_DIR }}
        run: npx expo-doctor

      - name: Generate native Android project
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          rm -rf android
          npx expo prebuild --platform android --non-interactive

      - name: Build release APK
        working-directory: ${{ env.PROJECT_DIR }}/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify release APK
        shell: bash
        run: |
          echo "Created APK files:"
          find "${PROJECT_DIR}/android/app/build/outputs/apk" \
            -type f \
            -name "*.apk" \
            -print

          if ! find "${PROJECT_DIR}/android/app/build/outputs/apk/release" \
            -type f \
            -name "*.apk" | grep -q .; then
            echo "ERROR: Release APK was not created."
            exit 1
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: family-clean-quest-release-apk
          path: ${{ env.PROJECT_DIR }}/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
