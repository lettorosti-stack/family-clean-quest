name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build Android release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check Expo project
        run: npx expo-doctor

      - name: Generate native Android project
        run: |
          rm -rf android
          npx expo prebuild --platform android --non-interactive

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify release APK
        shell: bash
        run: |
          echo "Created APK files:"
          find android/app/build/outputs/apk -type f -name "*.apk" -print

          if ! find android/app/build/outputs/apk/release -type f -name "*.apk" | grep -q .; then
            echo "ERROR: Release APK was not created."
            exit 1
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: family-clean-quest-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14
